name: vacunacion_canina_felina
description: Sistema de gestion de campana de vacunacion canina y felina.
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # Estado
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Navegacion
  go_router: ^14.0.0

  # Base de datos local (offline)
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Camara y GPS
  image_picker: ^1.1.0
  geolocator: ^13.0.0
  permission_handler: ^12.0.0

  # Conectividad
  connectivity_plus: ^6.0.0

  # Imagenes
  cached_network_image: ^3.4.0

  # Graficos
  fl_chart: ^0.70.0

  # Utilidades
  uuid: ^4.5.0
  intl: ^0.20.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  riverpod_generator: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1


flutter:
  uses-material-design: true



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter_native_splash:
  color: "#1565C0"   # fondo
  image: assets/splash/logo.png
  android: true
  ios: false